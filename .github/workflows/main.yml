name: Keep Supabase Database Active

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js ws

      - name: Ping Supabase Database
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const { createClient } = require('@supabase/supabase-js');
          const WebSocket = require('ws');
          
          if (!process.env.NEXT_PUBLIC_SUPABASE_URL || !process.env.SUPABASE_SERVICE_ROLE_KEY) {
            console.log('⚠️ Missing Supabase secrets.');
            process.exit(1);
          }

          const supabase = createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL,
            process.env.SUPABASE_SERVICE_ROLE_KEY,
            {
              realtime: {
                transport: WebSocket
              },
              auth: { persistSession: false }
            }
          );
          
          (async () => {
            try {
              // Simple HTTP API call to keep database active
              const { data, error } = await supabase.auth.admin.listUsers();
              
              if (error) {
                if (error.message.includes('Unauthorized')) {
                  console.log('❌ Service Role Key is invalid or expired');
                  process.exit(1);
                }
                console.log('⚠️ Note:', error.message);
              } else {
                console.log('✅ Successfully connected to Supabase');
              }
              
              console.log('✅ API request sent. Database activity recorded.');
              console.log('Timestamp:', new Date().toISOString());
              
            } catch (err) {
              console.log('⚠️ Error during ping:', err.message);
              process.exit(0);
            }
          })();
          EOF

      - name: Keep GitHub Actions Alive
        run: |
          LAST_COMMIT_DATE=$(git log -1 --format=%ct)
          CURRENT_DATE=$(date +%s)
          DAYS_SINCE_COMMIT=$(( (CURRENT_DATE - LAST_COMMIT_DATE) / 86400 ))
          
          if [ "$DAYS_SINCE_COMMIT" -gt 50 ]; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git commit --allow-empty -m "chore: keep github actions alive"
            git push
          else
            echo "Last commit was $DAYS_SINCE_COMMIT days ago. No keepalive commit needed."
          fi
